kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: wwwsqldesigner-template
objects:
- kind: Deployment
  apiVersion: apps/v1
  metadata:
    name: wwwsqldesigner
    labels:
      app: wwwsqldesigner
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: wwwsqldesigner
    template:
      metadata:
        labels:
          app: wwwsqldesigner
      spec:
        imagePullSecrets:
        # Secret provided by User for pulling images
        - name: default-dockercfg-fgvw5
        containers:
        - name: wwwsqldesigner
          image: ${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/wwwsqldesigner:${IMAGE_TAG}
          ports:
          - containerPort: 8080
          env:
          - name: ASPNETCORE_ENVIRONMENT
            value: ${ENVIRONMENT}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

- kind: Service
  apiVersion: v1
  metadata:
    name: wwwsqldesigner
  spec:
    ports:
    - name: http
      port: 8080
      targetPort: 8080
    selector:
      app: wwwsqldesigner

- kind: Route
  apiVersion: route.openshift.io/v1
  metadata:
    name: wwwsqldesigner
  spec:
    to:
      kind: Service
      name: wwwsqldesigner
    port:
      targetPort: 8080
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
parameters:
- name: IMAGE_REGISTRY
  value: ghcr.io
- name: IMAGE_NAMESPACE
  required: true
- name: IMAGE_TAG
  value: latest
- name: ENVIRONMENT
  value: Development
